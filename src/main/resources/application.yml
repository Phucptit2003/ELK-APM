spring:
  application:
    name: spring-elk-demo
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/${MYSQL_DB:demodb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:demouser}
    password: ${MYSQL_PASSWORD:demopassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.demo: DEBUG
    org.springframework: INFO
elastic:
  apm:
    service-name: spring-elk-demo
    server-url: http://apm-server:8200
    application-packages: com.demo
    environment: docker
    verify-server-connection: false
