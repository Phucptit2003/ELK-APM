input {
  tcp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  if [message] {
    mutate {
      add_field => { "received_at" => "%{@timestamp}" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    remove_field => [ "timestamp" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "spring-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "changeme"
  }

  stdout {
    codec => rubydebug
  }
}
